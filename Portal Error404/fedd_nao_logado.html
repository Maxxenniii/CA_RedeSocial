<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PortalError404 - Feed</title>
  <link rel="stylesheet" href="css/home.css">
  <link rel="stylesheet" href="css/nav.css">
  <link rel="stylesheet" href="css/feed.css">
  <link rel="stylesheet" href="/css/notificacoes.css">

</head>
<body>
  <header>
    <nav id="nav-container"></nav>
  </header>
  <script src="js/componentes-nao-logado.js"></script>

  <div class="main-wrapper">
    <aside class="sidebar" id="sidebar-container"></aside>

    <main class="content-area">
      <h2>Feed</h2>

      <!-- Seletor de filtro (apenas visual, sem ação) -->
      <div class="feed-filter">
        <div class="filter-option active" data-filter="all">📰 Todos os posts</div>
        <div class="filter-option" data-filter="ca">🏛️ Apenas CA</div>
      </div>

      <!-- Container do feed estático (posts mock) -->
      <div id="feedContainer">
        <!-- Posts serão inseridos via JS para facilitar manutenção -->
      </div>
    </main>

    <aside class="right-panel" id="suggestions-container"></aside>
  </div>

  <footer>
    <p>&copy; 2026 PortalError404 - Rede Social Acadêmica</p>
  </footer>
  <script src="js/common.js"></script>
