<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - PortalError404</title>
  <link rel="stylesheet" href="css/home.css">
  <link rel="stylesheet" href="css/nav.css">
  <link rel="icon" type="image/x-icon" href="/favicon/favicon.ico">
</head>
<body>
  <header>
    <nav id="nav-container"></nav>
  </header>
  <script src="js/componentes.js"></script>

  <div class="main-wrapper" style="justify-content: center;">
    <div class="content-area" style="max-width: 400px; margin: 50px auto;">
      <h2>Login</h2>
      <form id="loginForm">
        <div class="form-group">
          <label for="nome">Nome de exibição:</label>
          <input type="text" id="nome" placeholder="Seu nome" required>
        </div>
        <div class="form-group">
          <label for="email">E-mail:</label>
          <input type="email" id="email" placeholder="exemplo@dominio.com" required>
        </div>
        <div class="form-group">
          <label for="senha">Senha:</label>
          <input type="password" id="senha" placeholder="********" required>
        </div>
        <button type="submit" class="btn-primary">Entrar</button>
        <a href="recuperar-senha.html" style="margin-left:15px; color: var(--text-muted);">Esqueci a senha</a>
      </form>
      <p style="margin-top:20px;">Não tem conta? <a href="cadastro.html" style="color: var(--text-primary);">Cadastre-se</a></p>
    </div>
  </div>

  <footer>
    <p>&copy; 2026 PortalError404 - Rede Social Acadêmica</p>
  </footer>

  <script src="js/login.js"></script>
  <script src="js/aparencia.js"></script>
</body>
</html>
