<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - PortalError404</title>
  <link rel="stylesheet" href="/css/home.css">
  <link rel="icon" type="image/x-icon" href="/favicon/favicon.ico">
</head>
<body>
  <header>
    <nav>
      <div class="nav-left">
        <a href="index.html"><img src="/img/Logo_CA_Branco.png" alt="Logo CA" class="logo"></a>
        <div class="search-bar">
          <input type="text" placeholder="Buscar...">
          <button>Buscar</button>
        </div>
      </div>
      <ul class="nav-links">
        <li><a href="login.html">Login</a></li>
        <li><a href="cadastro.html" class="btn-cadastrar">Cadastrar</a></li>
      </ul>
    </nav>
  </header>

  <div class="main-wrapper" style="justify-content: center;">
    <div class="content-area" style="max-width: 400px; margin: 50px auto;">
      <h2>Login</h2>
      <form action="feed.html" method="get">
        <div class="form-group">
          <label for="email">E-mail ou usuario:</label>
          <input type="text" id="email" name="email" placeholder="ex: fulano@ca.org" required>
        </div>
        <div class="form-group">
          <label for="senha">Senha:</label>
          <input type="password" id="senha" name="senha" placeholder="********" required>
        </div>
        <button type="submit" class="btn-primary">Entrar</button>
        <a href="recuperar-senha.html" style="margin-left:15px; color: var(--text-muted);">Esqueci a senha</a>
      </form>
      <p style="margin-top:20px;">Nao tem conta? <a href="cadastro.html" style="color: var(--text-primary);">Cadastre-se</a></p>
    </div>
  </div>

  <footer>
    <p>&copy; 2026 PortalError404 - Rede Social Academica</p>
  </footer>
</body>
</html>
